name: pytest

on:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    name: pytest
    steps:
      - uses: actions/checkout@v3
      - uses: mamba-org/setup-micromamba@v2
        with:
            environment-file: environment.yml
            init-shell: >-
                bash
                powershell
            cache-environment: true
            post-cleanup: 'all'
      - name: Import numpy in micromamba environment (bash)
        run: pip install -e .
        shell: bash -el {0}
      - name: Check pytest version (micromamba shell)
        run: pytest --version
        shell: micromamba-shell {0}
      - name: Run tests with coverage (micromamba shell)
        run: pytest --cov=nrvplinet
        shell: micromamba-shell {0}
    
